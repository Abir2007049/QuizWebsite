[phases.setup]
nixPkgs = ['nodejs_18', 'php82', 'php82Packages.composer']

[phases.install]
cmds = [
  'composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist',
  'npm ci --no-audit --no-fund'
]

[phases.build]
cmds = [
  'npm run build'
]

[start]
cmd = 'sleep 20 && export DB_HOST="${DB_HOST:-${MYSQLHOST:-mysql.railway.internal}}" DB_PORT="${DB_PORT:-${MYSQLPORT:-3306}}" DB_DATABASE="${DB_DATABASE:-${MYSQLDATABASE:-railway}}" DB_USERNAME="${DB_USERNAME:-$MYSQLUSER}" DB_PASSWORD="${DB_PASSWORD:-$MYSQLPASSWORD}" && echo "DB_HOST=$DB_HOST DB_PORT=$DB_PORT DB_DATABASE=$DB_DATABASE" && php artisan config:clear && php artisan migrate --force && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT'
